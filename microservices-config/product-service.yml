server:
  port: 9090

spring:
  datasource:
    url: jdbc:h2:mem:productdb
    username: sa
    password: 
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true

# Eureka (Requisito 3.2)
couponService:
  url: http://COUPON-SERVICE/couponapi/coupons/

eureka:
  instance:
    hostname: localhost
    instance-id: ${spring.application.name}:${server.port}
    prefer-ip-address: false
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

resilience4j:
  circuitbreaker:
    instances:
      couponService:
        registerHealthIndicator: true
        eventConsumerBufferSize: 10
        failureRateThreshold: 50
        minimumNumberOfCalls: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
management:
  tracing:
    sampling:
      probability: 1.0 # Captures 100% of requests
  zipkin:
    tracing:
      endpoint: "http://localhost:9411/api/v2/spans"